apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "terminal-zero-governance.fullname" . }}
  labels:
    {{- include "terminal-zero-governance.labels" . | nindent 4 }}
spec:
  backoffLimit: {{ .Values.job.backoffLimit }}
  {{- if gt (int .Values.job.activeDeadlineSeconds) 0 }}
  activeDeadlineSeconds: {{ .Values.job.activeDeadlineSeconds }}
  {{- end }}
  template:
    metadata:
      labels:
        {{- include "terminal-zero-governance.labels" . | nindent 8 }}
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      # restartPolicy: Never is required for Kubernetes Jobs.
      # kubectl apply will reject the manifest without this field.
      restartPolicy: Never
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: governance
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command: ["sop"]
          args:
            {{- toYaml .Values.sopArgs | nindent 12 }}
          volumeMounts:
            - name: workspace
              mountPath: /workspace
          {{- with .Values.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
      volumes:
        - name: workspace
          persistentVolumeClaim:
            claimName: {{ .Values.workspace.pvcName | quote }}
