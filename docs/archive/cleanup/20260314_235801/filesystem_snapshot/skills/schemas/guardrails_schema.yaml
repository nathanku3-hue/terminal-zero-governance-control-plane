# Guardrails Schema v1.0.0
# Defines the structure for skills/{skill_name}/guardrails.yaml
# Safety gates and failure handling for skills

schema_version: "1.0.0"
description: "Schema for skill guardrails.yaml files"

type: object
required:
  - schema_version
  - skill_name
  - gates

properties:
  schema_version:
    type: string
    pattern: "^[0-9]+\\.[0-9]+\\.[0-9]+$"
    description: "Semantic version of this schema"

  skill_name:
    type: string
    pattern: "^[a-z0-9-]+$"
    description: "Skill identifier (must match skill.yaml name)"

  gates:
    type: object
    description: "Guardrail gates organized by execution phase"
    properties:
      pre_execution:
        type: array
        description: "Gates that must pass before execution"
        items:
          type: object
          required:
            - gate_id
            - description
            - required
          properties:
            gate_id:
              type: string
              pattern: "^[a-z0-9_]+$"
              description: "Unique gate identifier"

            description:
              type: string
              description: "Human-readable gate description"

            required:
              type: boolean
              description: "Whether this gate is mandatory"

            validation_method:
              type: string
              description: "How to validate this gate"

      during_execution:
        type: array
        description: "Gates monitored during execution"
        items:
          type: object
          required:
            - gate_id
            - description
            - required
          properties:
            gate_id:
              type: string
              pattern: "^[a-z0-9_]+$"

            description:
              type: string

            required:
              type: boolean

            monitoring_interval:
              type: string
              description: "How often to check this gate"

      post_execution:
        type: array
        description: "Gates that must pass after execution"
        items:
          type: object
          required:
            - gate_id
            - description
            - required
          properties:
            gate_id:
              type: string
              pattern: "^[a-z0-9_]+$"

            description:
              type: string

            required:
              type: boolean

            validation_method:
              type: string

  failure_handling:
    type: object
    description: "How to handle gate failures"
    properties:
      rollback_required:
        type: boolean
        description: "Whether rollback is required on failure"

      escalation_path:
        type: string
        enum:
          - auditor
          - pm
          - ceo
          - pm_ceo
        description: "Who to escalate failures to"

      max_retry_attempts:
        type: integer
        minimum: 0
        maximum: 5
        description: "Maximum retry attempts before escalation"
