name: Full Test Suite

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  full-test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, ubuntu-latest]
        python-version: ['3.12']
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Create virtual environment
        run: python -m venv .venv

      - name: Install development dependencies (Windows)
        if: runner.os == 'Windows'
        run: |
          .\.venv\Scripts\python -m pip install --upgrade pip
          .\.venv\Scripts\python -m pip install -c constraints-dev.txt ".[dev]"

      - name: Install development dependencies (Linux)
        if: runner.os != 'Windows'
        run: |
          ./.venv/bin/python -m pip install --upgrade pip
          ./.venv/bin/python -m pip install -c constraints-dev.txt ".[dev]"

      - name: Lint with ruff (Windows)
        if: runner.os == 'Windows'
        run: .\.venv\Scripts\ruff check src/ scripts/

      - name: Lint with ruff (Linux)
        if: runner.os != 'Windows'
        run: ./.venv/bin/ruff check src/ scripts/

      - name: Run full test suite (Windows)
        if: runner.os == 'Windows'
        run: .\.venv\Scripts\python -m pytest -q

      - name: Run full test suite (Linux)
        if: runner.os != 'Windows'
        run: ./.venv/bin/python -m pytest -q
